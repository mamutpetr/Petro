services:
  - type: web
    name: gilfoyle-ai-bot  # <--- Змініть на унікальну назву
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromProject: true
